#!/bin/bash
# Model definitions — source this file, then call add_model per entry.
#
# Fields:
#   name         — short identifier, used with run.sh
#   binary       — llama-server binary (default: llama-server)
#   model        — path to .gguf file
#   mmproj       — path to mmproj file (omit if none)
#   alias        — model alias passed to --alias
#   label        — human-readable name for listing
#   ctx          — context window size, passed as --ctx-size (per model; the hard
#                  upper bound for the client. KV-cache grows linearly with this.)
#   extra_args   — additional llama-server flags (bash array; do NOT put -c,
#                  --parallel or --timeout here — those are set centrally by run.sh)
#   client_name  — the model name Claude Code sends to the API
#                  (omit to use the same value as alias)
#   rocm_env     — space-separated KEY=VAL pairs for ROCm env (empty = Vulkan)
#   hf_repo           — HuggingFace repo for download (e.g. unsloth/Qwen3-GGUF)
#   hf_includes       — space-separated glob patterns for hf download --include
#   no_reasoning_args — extra llama-server args appended when --no-reasoning is set (optional)

add_model() {
    _MODELS+=("$_model_name|$_model_binary|$_model_model|$_model_mmproj|$_model_alias|$_model_label|${_model_extra_args[*]}|$_model_client_name|$_model_rocm_env|$_model_hf_repo|${_model_hf_includes[*]}|$_model_hf_dir|${_model_no_reasoning_args[*]}|$_model_ctx")
}

# ── Default binary ──────────────────────────────────────────
LLAMA_DEFAULT_BIN="llama-server"
LLAMA_ROCM_BIN="/opt/llama.cpp-rocm/llama-server"

# ── Common defaults (overridable per model) ─────────────────
_common=(--temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.00
    --presence_penalty 0.00 --repeat_penalty 1.00
    --cache-type-k q8_0 --cache-type-v q8_0
    --jinja --flash-attn on --cache-prompt --threads 16 --no-mmap -ngl 99)

# Default ROCm env vars (empty = no ROCm env vars set, uses Vulkan)
_default_rocm_env="ROC_ENABLE_PREFETCH=1 HSA_ENABLE_COMPRESSION=1 HSA_ENABLE_SDMA=0"

