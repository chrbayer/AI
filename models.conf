_model_alias="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
_model_label="Qwen3.6-35B-A3B MoE Unc"
_model_ctx="65536"   # coding model; MoE → tiny KV (~43KB/tok), fits easily
_model_extra_args=("${_common[@]}")
_model_client_name=""
_model_rocm_env=""
_model_hf_repo="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
_model_hf_includes=("*Q8_K_P*" "*mmproj*")
_model_hf_dir=""
