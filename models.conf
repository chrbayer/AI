_model_mmproj="~/AI/Models/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-GGUF/mmproj-Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf"
_model_alias="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
_model_label="Qwen3.6-35B-A3B MoE Unc"
_model_extra_args=("${_common[@]}" -c 262144)
_model_client_name=""
_model_rocm_env=""
_model_hf_repo="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
_model_hf_includes=("*Q8_K_P*" "*mmproj*")
_model_hf_dir=""
_model_no_reasoning_args=(--temp 0.7 --top-p 0.80 --presence_penalty 1.50)
